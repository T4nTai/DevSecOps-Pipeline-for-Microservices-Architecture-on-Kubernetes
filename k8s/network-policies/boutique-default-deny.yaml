# Block all ingress and egress by default for both app namespaces.
# Explicit allow policies below carve out only what is needed.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: boutique-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: boutique-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
