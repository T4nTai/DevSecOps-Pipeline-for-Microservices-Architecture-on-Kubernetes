# Service-to-service communication rules (3-service topology):
#
#   frontend (8080) → productcatalogservice (3550)  gRPC
#   frontend (8080) → adservice (9555)              gRPC
#
# ── boutique-dev ──────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: boutique-dev
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - protocol: TCP
          port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: adservice
      ports:
        - protocol: TCP
          port: 9555
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-productcatalog-ingress
  namespace: boutique-dev
spec:
  podSelector:
    matchLabels:
      app: productcatalogservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 3550
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-adservice-ingress
  namespace: boutique-dev
spec:
  podSelector:
    matchLabels:
      app: adservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 9555
