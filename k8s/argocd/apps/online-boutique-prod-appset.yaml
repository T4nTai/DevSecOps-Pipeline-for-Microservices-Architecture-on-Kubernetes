# Applied by: envsubst < k8s/argocd/apps/online-boutique-prod-appset.yaml | kubectl apply -f -
# Watches: main branch
# Deploys to: namespace boutique-prod
# Image tags: N  (pushed by Jenkins on merge to main)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: online-boutique-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
    - list:
        elements:
          - service: frontend
            ingressHost: "app.${DOMAIN}"
          - service: productcatalogservice
            ingressHost: ""
          - service: adservice
            ingressHost: ""

  template:
    metadata:
      name: 'prod-{{service}}'
    spec:
      project: default

      source:
        repoURL: https://github.com/T4nTai/DevSecOps-Pipeline-for-Microservices-Architecture-on-Kubernetes.git
        targetRevision: main
        path: k8s/helm/microservice
        helm:
          releaseName: '{{service}}'
          valueFiles:
            - ../values/{{service}}.yaml
          values: |
            global:
              harborRegistry: harbor.${DOMAIN}
            ingress:
              host: '{{ingressHost}}'

      destination:
        name: in-cluster
        namespace: boutique-prod

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  templatePatch: |
    spec:
      ignoreDifferences:
        - group: argoproj.io
          kind: Rollout
          jsonPointers:
            - /spec/replicas
