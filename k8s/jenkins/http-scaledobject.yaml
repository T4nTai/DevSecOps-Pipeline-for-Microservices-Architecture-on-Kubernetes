kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: jenkins
  namespace: jenkins
spec:
  hosts:
    - "*"
  pathPrefixes:
    - /jenkins
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: jenkins
    service: jenkins
    port: 8080
  replicas:
    min: 1
    max: 1
  scaledownPeriod: 300
