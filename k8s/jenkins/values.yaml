controller:
  admin:
    password: "JENKINS_ADMIN_PASSWORD_PLACEHOLDER"

  jenkinsUrl: "https://jenkins.tools.votantai.me"
  jenkinsUriPrefix: ""

  customStartupProbe:
    httpGet:
      path: /login
      port: 8080
    failureThreshold: 12
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5

  serviceType: ClusterIP
  servicePort: 8080

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - blueocean:latest
    - credentials-binding:latest
    - pipeline-stage-view:latest
    - docker-workflow:latest
    - sonar:latest
    - hashicorp-vault:latest

  JCasC:
    configScripts:
      jenkins-url: |
        jenkins:
          systemMessage: "DevSecOps Jenkins"
      vault-config: |
        unclassified:
          hashicorpVault:
            configuration:
              vaultUrl: "https://vault.tools.votantai.me"
              vaultCredentialId: "vault-approle"
              engineVersion: 2
      sonarqube-config: |
        unclassified:
          sonarGlobalConfiguration:
            buildWrapperEnabled: false
            installations:
              - name: "sonarqube"
                serverUrl: "https://sonarqube.tools.votantai.me"
                credentialsId: "sonarqube-token"

persistence:
  enabled: true
  storageClass: ebs-sc
  size: 10Gi

agent:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
