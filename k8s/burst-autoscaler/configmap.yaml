apiVersion: v1
kind: ConfigMap
metadata:
  name: burst-autoscaler-script
  namespace: kube-system
data:
  autoscaler.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    REGION="${AWS_REGION:-ap-southeast-1}"
    BURST_WORKER_ID="${BURST_WORKER_ID}"           # inject từ env CronJob
    BURST_WORKER_IP="${BURST_WORKER_IP}"           # inject từ env CronJob
    IDLE_TIMEOUT="${IDLE_TIMEOUT:-300}"            # stop sau N giây idle (default 5 phút)
    NS="kube-system"
    STATE_CM="burst-autoscaler-state"

    ts() { date '+%H:%M:%S'; }
    log()  { echo "$(ts) [AUTO] $*"; }
    log_ok()   { echo "$(ts) [OK  ] $*"; }
    log_warn() { echo "$(ts) [WARN] $*"; }

    # ── Đọc state từ ConfigMap ────────────────────────────────────────────────
    LAST_ACTIVE=$(kubectl get configmap "$STATE_CM" -n "$NS" \
      -o jsonpath='{.data.last_active}' 2>/dev/null || echo "0")
    CURRENT_STATUS=$(kubectl get configmap "$STATE_CM" -n "$NS" \
      -o jsonpath='{.data.status}' 2>/dev/null || echo "idle")

    # ── Trạng thái EC2 ────────────────────────────────────────────────────────
    EC2_STATE=$(aws ec2 describe-instances \
      --instance-ids "$BURST_WORKER_ID" \
      --region "$REGION" \
      --query 'Reservations[0].Instances[0].State.Name' \
      --output text 2>/dev/null || echo "unknown")

    # ── Đếm FailedScheduling events do Insufficient cpu/memory ───────────────
    INSUFFICIENT=$(kubectl get events --all-namespaces \
      --field-selector reason=FailedScheduling \
      -o json 2>/dev/null \
      | python3 -c "
    import sys,json
    data=json.load(sys.stdin)
    c=sum(1 for e in data.get('items',[])
          if 'Insufficient cpu' in (e.get('message') or '')
          or 'Insufficient memory' in (e.get('message') or ''))
    print(c)
    " 2>/dev/null || echo "0")

    # Đếm thêm pod Pending (event có thể expire sau 1h)
    PENDING=$(kubectl get pods --all-namespaces \
      --field-selector=status.phase=Pending \
      --no-headers 2>/dev/null | wc -l | tr -d ' ')

    # Đếm pod đang CHẠY trên burst worker (không tính daemonset/kube-system)
    NODE_NAME=$(kubectl get nodes -o wide --no-headers 2>/dev/null \
      | awk -v ip="$BURST_WORKER_IP" '$6==ip {print $1}')

    ACTIVE_PODS=0
    if [ -n "$NODE_NAME" ]; then
      ACTIVE_PODS=$(kubectl get pods --all-namespaces \
        --field-selector="spec.nodeName=${NODE_NAME},status.phase=Running" \
        --no-headers 2>/dev/null \
        | grep -v "^kube-system" | wc -l | tr -d ' ')
    fi

    NOW=$(date +%s)

    log "EC2=$EC2_STATE | FailedScheduling=$INSUFFICIENT | Pending=$PENDING | ActiveOnBurst=$ACTIVE_PODS | Status=$CURRENT_STATUS"

    # ── Cập nhật state helper ─────────────────────────────────────────────────
    update_state() {
      local last_active="$1" status="$2"
      kubectl patch configmap "$STATE_CM" -n "$NS" \
        --type merge \
        -p "{\"data\":{\"last_active\":\"${last_active}\",\"status\":\"${status}\"}}" \
        2>/dev/null || true
    }

    # ── Có pod thiếu tài nguyên → cần scale up ───────────────────────────────
    if [ "$INSUFFICIENT" -gt 0 ] || [ "$PENDING" -gt 0 ] || [ "$ACTIVE_PODS" -gt 0 ]; then
      update_state "$NOW" "scaling-up"

      if [ "$EC2_STATE" = "stopped" ]; then
        log_warn "Phát hiện ${INSUFFICIENT} FailedScheduling + ${PENDING} Pending + ${ACTIVE_PODS} active → START burst worker"

        aws ec2 start-instances \
          --instance-ids "$BURST_WORKER_ID" \
          --region "$REGION" > /dev/null
        log "EC2 start-instances đã gửi, đợi instance running..."

        aws ec2 wait instance-running \
          --instance-ids "$BURST_WORKER_ID" \
          --region "$REGION"
        log_ok "EC2 running"

        # Đợi K8s node Ready (tối đa 3 phút)
        for i in $(seq 1 18); do
          NODE_STATUS=$(kubectl get nodes -o wide --no-headers 2>/dev/null \
            | awk -v ip="$BURST_WORKER_IP" '$6==ip {print $2}')
          if [ "$NODE_STATUS" = "Ready,SchedulingDisabled" ] || \
             [ "$NODE_STATUS" = "Ready" ]; then
            break
          fi
          log "Đợi node Ready... (${i}/18)"
          sleep 10
        done

        NODE_NAME=$(kubectl get nodes -o wide --no-headers 2>/dev/null \
          | awk -v ip="$BURST_WORKER_IP" '$6==ip {print $1}')

        if [ -n "$NODE_NAME" ]; then
          kubectl uncordon "$NODE_NAME" 2>/dev/null || true
          log_ok "Node $NODE_NAME đã uncordon — sẵn sàng nhận pods"
          update_state "$NOW" "running"
        else
          log_warn "Node chưa join cluster sau 3 phút"
          update_state "$NOW" "scaling-up"
        fi

      elif [ "$EC2_STATE" = "running" ]; then
        log "Burst worker đang running — đảm bảo uncordon"
        NODE_NAME=$(kubectl get nodes -o wide --no-headers 2>/dev/null \
          | awk -v ip="$BURST_WORKER_IP" '$6==ip {print $1}')
        [ -n "$NODE_NAME" ] && kubectl uncordon "$NODE_NAME" 2>/dev/null || true
        update_state "$NOW" "running"

      else
        log "EC2 đang ở trạng thái: $EC2_STATE — chờ..."
        update_state "$NOW" "scaling-up"
      fi

    # ── Không có pending pods → kiểm tra idle time ───────────────────────────
    else
      if [ "$EC2_STATE" = "running" ]; then
        IDLE_SECS=$((NOW - LAST_ACTIVE))

        if [ "$LAST_ACTIVE" = "0" ]; then
          log "Burst worker running, bắt đầu đếm idle"
          update_state "$NOW" "running"

        elif [ "$IDLE_SECS" -ge "$IDLE_TIMEOUT" ]; then
          log_warn "Idle ${IDLE_SECS}s ≥ ${IDLE_TIMEOUT}s → STOP burst worker"
          update_state "$NOW" "scaling-down"

          NODE_NAME=$(kubectl get nodes -o wide --no-headers 2>/dev/null \
            | awk -v ip="$BURST_WORKER_IP" '$6==ip {print $1}')

          if [ -n "$NODE_NAME" ]; then
            kubectl drain "$NODE_NAME" \
              --ignore-daemonsets \
              --delete-emptydir-data \
              --timeout=120s \
              --force 2>/dev/null || true
            kubectl cordon "$NODE_NAME" 2>/dev/null || true
          fi

          aws ec2 stop-instances \
            --instance-ids "$BURST_WORKER_ID" \
            --region "$REGION" > /dev/null
          log_ok "EC2 stop-instances đã gửi"
          update_state "0" "idle"

        else
          REMAINING=$((IDLE_TIMEOUT - IDLE_SECS))
          log "Idle ${IDLE_SECS}s — stop sau ${REMAINING}s nữa"
          update_state "$LAST_ACTIVE" "running"
        fi

      else
        log "EC2=$EC2_STATE, không có workload — idle"
        update_state "0" "idle"
      fi
    fi
