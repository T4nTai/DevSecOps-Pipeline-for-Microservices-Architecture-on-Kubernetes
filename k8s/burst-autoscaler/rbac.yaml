apiVersion: v1
kind: ServiceAccount
metadata:
  name: burst-autoscaler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: burst-autoscaler
rules:
  # Đọc pods để phát hiện Pending
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Đọc events để lấy FailedScheduling / Insufficient cpu
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  # Đọc nodes để kiểm tra trạng thái burst-worker
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  # Đọc/ghi ConfigMap để lưu state (LAST_ACTIVE)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
    resourceNames: ["burst-autoscaler-state"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: burst-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: burst-autoscaler
subjects:
  - kind: ServiceAccount
    name: burst-autoscaler
    namespace: kube-system
