controller:
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    proxy-body-size: "50m"

  extraArgs:
    default-backend-service: ingress-nginx/sorry-page

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: prometheus

defaultBackend:
  enabled: false
