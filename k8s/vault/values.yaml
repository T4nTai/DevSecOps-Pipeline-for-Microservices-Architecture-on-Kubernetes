server:
  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: ebs-sc

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      seal "awskms" {
        region     = "ap-southeast-1"
        kms_key_id = "alias/vault-unseal"
      }

  service:
    type: ClusterIP
    port: 8200

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    hosts:
      - host: vault.tools.votantai.me
        paths:
          - /
    tls:
      - secretName: tools-wildcard-tls
        hosts:
          - vault.tools.votantai.me

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ui:
  enabled: true

injector:
  enabled: true
