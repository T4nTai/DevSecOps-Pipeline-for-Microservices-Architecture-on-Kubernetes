apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-success-rate
  namespace: default
spec:
  metrics:
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: result[0] >= 0.95
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            (
              sum(rate(nginx_ingress_controller_requests{ingress="frontend",namespace="default",status!~"5.."}[2m]))
              /
              sum(rate(nginx_ingress_controller_requests{ingress="frontend",namespace="default"}[2m]))
            ) or vector(1)
