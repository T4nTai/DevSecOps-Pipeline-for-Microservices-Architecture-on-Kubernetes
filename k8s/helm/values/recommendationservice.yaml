image:
  repository: gcr.io/google-samples/microservices-demo/recommendationservice
  tag: "v0.10.1"

port:
  container: 8080
  service: 8080

probe:
  type: grpc
  initialDelaySeconds: 15
  periodSeconds: 10

resources:
  requests:
    cpu: "100m"
    memory: "220Mi"
  limits:
    cpu: "200m"
    memory: "450Mi"

env:
  - name: PORT
    value: "8080"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice:3550"
  - name: DISABLE_PROFILER
    value: "1"
