image:
  repository: library/frontend
  tag: "latest"
  pullSecret: harbor-credentials
  harborImage: true

replicas: 2

port:
  container: 8080
  service: 80           # external port differs from container port

probe:
  type: http
  path: /_healthz
  initialDelaySeconds: 10
  periodSeconds: 10

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

env:
  - name: PORT
    value: "8080"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice:3550"
  - name: AD_SERVICE_ADDR
    value: "adservice:9555"
  - name: CYMBAL_BRANDING
    value: "false"
  - name: ENABLE_PROFILER
    value: "0"

canary:
  enabled: true
  trafficRouting:
    enabled: true
  analysis:
    enabled: true

ingress:
  enabled: true
  host: ""   # injected via AppSet helm.values at deploy time
  className: nginx
  tls: false
