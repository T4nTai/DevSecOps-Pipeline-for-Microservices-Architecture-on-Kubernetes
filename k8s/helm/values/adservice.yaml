image:
  repository: gcr.io/google-samples/microservices-demo/adservice
  tag: "v0.10.1"

port:
  container: 9555
  service: 9555

probe:
  type: grpc
  initialDelaySeconds: 20
  periodSeconds: 15

resources:
  requests:
    cpu: "200m"
    memory: "180Mi"
  limits:
    cpu: "300m"
    memory: "300Mi"

env:
  - name: PORT
    value: "9555"
