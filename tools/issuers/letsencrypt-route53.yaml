# ClusterIssuer — Let's Encrypt via Route53 DNS-01 (AWS)
#
# Applied by scripts/lib/09-cert-manager.sh via envsubst:
#   ${ACME_EMAIL}       — from .env or SSM
#   ${AWS_REGION}       — from .env or state file
#   ${ROUTE53_ZONE_ID}  — from infra/aws/dns/ terraform output (DNS state)
#
# IRSA flow:
#   cert-manager ServiceAccount → IRSA role (infra/aws/modules/iam/) → Route53
#
# Required IAM actions on stateful node role (infra/aws/modules/iam/main.tf):
#   route53:GetChange
#   route53:ChangeResourceRecordSets
#   route53:ListResourceRecordSets
#   route53:ListHostedZones
#   route53:ListHostedZonesByName
#
# DNS-01 flow:
#   cert-manager → writes TXT record in Route53 (hostedZoneID speeds this up)
#   Let's Encrypt → queries TXT via the domain's public NS servers
#   NS must be delegated to Route53 at Namecheap (one-time setup, stable forever)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${ACME_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: ${AWS_REGION}
            hostedZoneID: ${ROUTE53_ZONE_ID}
