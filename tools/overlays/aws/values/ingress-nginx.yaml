# ingress-nginx AWS overlay values
# We use a Terraform-managed NLB that forwards to NodePort 30080/30443.
# No AWS Load Balancer Controller needed — NodePort type is sufficient.
controller:
  service:
    type: NodePort               # NLB → NodePort (managed by Terraform, not k8s)
    nodePorts:
      http: 30080
      https: 30443
