# cert-manager Azure overlay values
# Uses Azure Workload Identity for DNS-01 challenges via Azure DNS.
# No static credentials — the pod identity is bound at ServiceAccount level.
#
# certManagerClientId is injected at apply time via helmfile set: from state values.
# See tools/overlays/azure/helmfile.yaml for the set: directive.

podLabels:
  azure.workload.identity/use: "true"

serviceAccount:
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: ""   # overridden by helmfile set:
