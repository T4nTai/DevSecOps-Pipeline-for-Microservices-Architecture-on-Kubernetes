# tools/overlays/azure/helmfile.yaml — Azure entry point
#
# Apply dev:  helmfile -f tools/overlays/azure/helmfile.yaml \
#                      --state-values-file tools/envs/dev/values.yaml sync
# Apply prod: helmfile -f tools/overlays/azure/helmfile.yaml \
#                      --state-values-file tools/envs/prod/values.yaml sync
#
# State values required (tools/envs/{dev,prod}/values.yaml):
#   certManagerClientId:  <azure-workload-identity-client-id>
#   azureTenantId:        <azure-tenant-id>
#   azureKeyVaultName:    <azure-key-vault-name>
#   domain:               example.com
#   grafanaAdminPassword: changeme
#   harborAdminPassword:  changeme

bases:
  - ../../base/helmfile.yaml

releases:

  # ── ingress-nginx: Azure Standard LB ─────────────────────────────────────────
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: "4.10.1"
    values:
      - ../../base/values/ingress-nginx.yaml
      - values/ingress-nginx.yaml   # LoadBalancer + Azure LB annotations

  # ── cert-manager: Azure Workload Identity ─────────────────────────────────────
  # certManagerClientId is read from --state-values-file at apply time.
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: "v1.14.5"
    values:
      - ../../base/values/cert-manager.yaml
      - values/cert-manager.yaml
    set:
      - name: serviceAccount.annotations.azure\.workload\.identity/client-id
        value: {{ .StateValues.certManagerClientId | default "" | quote }}

  # ── Vault: Azure Key Vault auto-unseal ────────────────────────────────────────
  # Tenant ID and Key Vault name are injected as env vars; HCL reads them via env().
  - name: vault
    namespace: vault
    chart: hashicorp/vault
    version: "0.28.0"
    values:
      - ../../base/values/vault.yaml
      - values/storage.yaml         # storageClass: managed-premium
      - values/vault.yaml           # Azure Key Vault seal stanza (uses env vars)
    set:
      - name: server.extraEnvironmentVars.AZURE_TENANT_ID
        value: {{ .StateValues.azureTenantId | default "" | quote }}
      - name: server.extraEnvironmentVars.AZURE_KEY_VAULT_NAME
        value: {{ .StateValues.azureKeyVaultName | default "" | quote }}

  # ── Releases that only need storageClass overridden ───────────────────────────
  - name: jenkins
    namespace: jenkins
    chart: jenkins/jenkins
    version: "5.1.5"
    values:
      - ../../base/values/jenkins.yaml
      - values/storage.yaml

  - name: prometheus
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "58.5.3"
    values:
      - ../../base/values/monitoring.yaml
      - values/storage.yaml

  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: "6.6.2"
    values:
      - ../../base/values/loki.yaml
      - values/storage.yaml

  - name: sonarqube
    namespace: sonarqube
    chart: sonarqube/sonarqube
    version: "10.5.1+2816"
    values:
      - ../../base/values/sonarqube.yaml
      - values/storage.yaml

  - name: harbor
    namespace: harbor
    chart: harbor/harbor
    version: "1.14.2"
    values:
      - ../../base/values/harbor.yaml
      - values/storage.yaml
