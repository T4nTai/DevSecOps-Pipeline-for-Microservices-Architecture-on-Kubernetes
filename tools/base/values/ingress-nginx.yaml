# ingress-nginx base values
# NodePort on 30080/30443 — Terraform-managed NLB forwards traffic here.
controller:
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    proxy-body-size: "50m"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: prometheus

  # Use wildcard cert from ingress-nginx namespace as default SSL cert.
  # This allows ingresses in other namespaces (jenkins, argocd, etc.) to
  # serve TLS without needing the secret copied to each namespace.
  extraArgs:
    default-ssl-certificate: "ingress-nginx/tools-wildcard-tls"

  # Disable admission webhook — self-signed cert causes x509 errors on
  # bare-metal clusters where the API server cannot verify the cert.
  admissionWebhooks:
    enabled: false

defaultBackend:
  enabled: false
