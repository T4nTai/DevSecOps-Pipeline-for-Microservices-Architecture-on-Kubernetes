# ingress-nginx base values
# Default: NodePort (bare-metal / local). Overlays set LoadBalancer + cloud annotations.
controller:
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"   # set true in AWS overlay (NLB requirement)
    proxy-body-size: "50m"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: prometheus

defaultBackend:
  enabled: false
