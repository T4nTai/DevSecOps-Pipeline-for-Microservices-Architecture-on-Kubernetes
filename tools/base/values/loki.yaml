# Loki base values — plain YAML, no template syntax
# storageClass injected via overlay: values/storage.yaml
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: ""   # set via overlay: values/storage.yaml
    size: 10Gi

service:
  type: ClusterIP
  port: 3100

gateway:
  nginxConfig:
    resolver: 10.96.0.3   # CoreDNS ClusterIP (Kubespray default)

promtail:
  enabled: false   # deployed separately

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false
