# Vault base values — plain YAML, no template syntax
# Domain injected via overlay set. KMS/Key Vault seal injected via overlay values/vault.yaml.
server:
  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: ""   # set via overlay: values/storage.yaml

  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
      # Seal config injected by cloud overlay (awskms / azurekeyvault)

  service:
    type: ClusterIP
    port: 8200

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    hosts: []     # set via overlay: [{host: vault.DOMAIN, paths: ["/"]}]
    tls: []       # set via overlay: [{secretName: tools-wildcard-tls, hosts: [vault.DOMAIN]}]

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ui:
  enabled: true

injector:
  enabled: true
