# Promtail base values — DaemonSet that ships pod logs to Loki
config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}   # parse containerd log format (Kubespray default runtime)

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

tolerations:
  - effect: NoSchedule
    operator: Exists   # run on all nodes including control-plane taints
